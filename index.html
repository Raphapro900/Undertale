<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Easter Egg</title>
    <style>
        /* ===== FUENTE PIXELADA (estilo Undertale) ===== */
        @font-face {
            font-family: 'Determination Mono';
            src: url('https://oliverspace.neocities.org/determination-mono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ===== ESTILO DEL CUADRO (como el generador) ===== */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
            font-family: 'Determination Mono', 'Courier New', monospace;
        }

        /* CONTENEDOR PRINCIPAL - simula el cuadro del generador */
        .dialogue-wrapper {
            background-color: #000000;
            border: 6px solid #ffffff;
            padding: 24px 28px;
            min-width: 320px;
            max-width: 600px;
            width: 85%;
            position: relative;
            box-shadow: 0 0 0 2px #000000, 0 0 0 4px #ffffff; /* Efecto de borde doble */
        }

        /* TEXTO DEL DIÁLOGO */
        .dialogue-text {
            color: #ffffff;
            font-family: 'Determination Mono', 'Courier New', monospace;
            font-size: 28px;
            line-height: 1.5;
            margin: 0;
            padding: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            letter-spacing: 0.5px;
            min-height: 80px;
        }

        /* NOMBRE DEL PERSONAJE (opcional) */
        .speaker-name {
            color: #ffffff;
            font-family: 'Determination Mono', 'Courier New', monospace;
            font-size: 22px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 6px;
            display: inline-block;
        }

        /* TEXTO AMARILLO (como en Undertale) */
        .yellow-text {
            color: #ffff00;
            font-family: 'Determination Mono', 'Courier New', monospace;
        }

        /* TEXTO ROJO */
        .red-text {
            color: #ff0000;
            font-family: 'Determination Mono', 'Courier New', monospace;
            text-transform: uppercase;
        }

        /* ===== TRIÁNGULO INDICADOR (parpadeante) ===== */
        .indicator {
            position: absolute;
            bottom: 8px;
            right: 14px;
            color: #ffffff;
            font-size: 26px;
            font-family: 'Determination Mono', 'Courier New', monospace;
            animation: blink 0.9s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== EFECTO DE TEMBLOR ===== */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-4px, -4px); }
            20% { transform: translate(4px, 2px); }
            30% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -2px); }
            50% { transform: translate(-2px, 4px); }
            60% { transform: translate(4px, 4px); }
            70% { transform: translate(-4px, -2px); }
            80% { transform: translate(2px, -4px); }
            90% { transform: translate(-4px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .shaking {
            animation: shake 0.15s infinite;
        }

        /* ===== HINT ===== */
        .hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            color: #555555;
            font-family: 'Determination Mono', 'Courier New', monospace;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- ===== CUADRO DE DIÁLOGO ===== -->
    <div id="dialogue-wrapper" class="dialogue-wrapper">
        <div id="speaker-name" class="speaker-name"></div>
        <p id="dialogue-text" class="dialogue-text"></p>
        <div class="indicator">▼</div>
    </div>

    <div class="hint">Presiona L</div>

    <script>
        // ============================================================
        // DIÁLOGOS DE UNDERTALE
        // ============================================================
        const undertaleQuotes = [
            "* Mantente determinado.",
            "* Realmente eres un flojo de primera.",
            "* ¿Quieres pasar un mal rato?",
            "* En este mundo, es MATAR o MORIR.",
            "* Cocinar con Undyne es un peligro de incendio real.",
            "* TIP: Si un ataque es azul, no te muevas.",
            "* TIP: Si un ataque es naranja, muévete a través de él.",
            "* DETALLE: W.D. Gaster vigila desde los archivos borrados.",
            "* A Papyrus le encantan los rompecabezas, pero nunca ha probado el spaghetti.",
            "* Si perdonas a todos, verás la luz del sol.",
            "* Aunque cambies de ruta, tus pecados no se borrarán.",
            "* ¿Huele a tierra húmeda... o a consecuencias?",
            "* Tocar el piano en Waterfall revela una puerta secreta.",
            "* Comer la tarta de Toriel en la batalla de Asgore debilita su ataque.",
            "* Vender cosas a Temmie es la única forma de conseguir oro fácil."
        ];

        // ============================================================
        // CONTROL
        // ============================================================
        let pressCount = 0;
        let isTyping = false;
        let typeTimeout = null;
        let currentText = "";
        const dialogueElement = document.getElementById('dialogue-text');
        const nameElement = document.getElementById('speaker-name');
        const wrapper = document.getElementById('dialogue-wrapper');

        // ============================================================
        // MÁQUINA DE ESCRIBIR
        // ============================================================
        function typeWriter(text, speed = 40, callback = null) {
            if (typeTimeout) {
                clearTimeout(typeTimeout);
                typeTimeout = null;
            }
            
            isTyping = true;
            currentText = text;
            dialogueElement.innerHTML = '';
            let i = 0;

            function type() {
                if (i < text.length) {
                    if (text[i] === '<') {
                        let closingIndex = text.indexOf('>', i);
                        if (closingIndex !== -1) {
                            const tag = text.substring(i, closingIndex + 1);
                            dialogueElement.innerHTML += tag;
                            i = closingIndex + 1;
                        } else {
                            dialogueElement.innerHTML += text[i];
                            i++;
                        }
                    } else {
                        dialogueElement.innerHTML += text[i];
                        i++;
                    }

                    typeTimeout = setTimeout(type, speed);
                } else {
                    isTyping = false;
                    typeTimeout = null;
                    if (callback) callback();
                }
            }
            type();
        }

        function skipDialogue() {
            if (typeTimeout) {
                clearTimeout(typeTimeout);
                typeTimeout = null;
            }
            if (currentText) {
                dialogueElement.innerHTML = currentText;
            }
            isTyping = false;
        }

        // ============================================================
        // CIERRE SEGURO
        // ============================================================
        function closePageSafely() {
            // Intentar cerrar
            try { window.close(); } catch (e) {}
            try { window.location.href = 'about:blank'; } catch (e) {}
            
            // Si no funciona, mostrar mensaje
            document.body.innerHTML = `
                <div style="
                    background: #000;
                    color: #fff;
                    font-family: 'Determination Mono', monospace;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                    font-size: 24px;
                    text-align: center;
                    padding: 20px;
                ">
                    <div>
                        <p>✦ ✦ ✦</p>
                        <p>EL JUEGO HA TERMINADO</p>
                        <p style="font-size: 18px; color: #666; margin-top: 20px;">
                            Cierra esta pestaña (Ctrl+W)
                        </p>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // MANEJADOR DE TECLA 'L'
        // ============================================================
        document.addEventListener('keydown', (event) => {
            if (event.key !== 'l' && event.key !== 'L') return;

            if (isTyping) {
                if (pressCount !== 55) {
                    skipDialogue();
                    return;
                }
                return;
            }

            pressCount++;

            if (pressCount < 50) {
                const randomIndex = Math.floor(Math.random() * undertaleQuotes.length);
                nameElement.textContent = "";
                typeWriter(undertaleQuotes[randomIndex], 40);
                return;
            }

            if (pressCount === 50) {
                nameElement.textContent = "";
                typeWriter("* ...", 40);
                return;
            }

            if (pressCount === 51) {
                nameElement.textContent = "";
                typeWriter('* ¿Porqué presionas muchas veces la <span class="yellow-text">L</span>?', 40);
                return;
            }

            if (pressCount >= 52 && pressCount <= 54) {
                nameElement.textContent = "";
                typeWriter("* ...", 40);
                return;
            }

            if (pressCount === 55) {
                wrapper.classList.add('shaking');
                const redText = '<span class="red-text">* YAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA</span>';
                typeWriter(redText, 15, () => {
                    setTimeout(() => {
                        wrapper.classList.remove('shaking');
                        closePageSafely();
                    }, 500);
                });
                return;
            }
        });

        // ============================================================
        // INICIO
        // ============================================================
        console.log('Undertale Easter Egg - Estilo Demirramon');
        setTimeout(() => {
            typeWriter("* Presiona la tecla L para comenzar...", 40);
        }, 300);
    </script>
</body>
</html>
