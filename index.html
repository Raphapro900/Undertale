<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale · Frisk (Con Assets)</title>
    <style>
        @font-face {
            font-family: 'Determination Mono';
            src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts/patched-fonts/UbuntuMono/Regular/complete/Ubuntu%20Mono%20Nerd%20Font%20Complete%20Mono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Determination Mono', monospace;
        }
        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #4a4a4a;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            background-color: #1a1a2e;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            background: #1a1a2e;
            cursor: default;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #pause-menu {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #f0e6d0;
            border-radius: 16px;
            padding: 24px 36px;
            color: #f0e6d0;
            font-size: 20px;
            display: none;
            flex-direction: column;
            gap: 12px;
            min-width: 260px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            text-shadow: 2px 2px 0 #3a2a1a;
        }
        #pause-menu.active {
            display: flex;
        }
        #pause-menu .title {
            font-size: 28px;
            text-align: center;
            border-bottom: 2px solid #b8a080;
            padding-bottom: 10px;
            margin-bottom: 6px;
            letter-spacing: 2px;
            color: #ffd78a;
        }
        .menu-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            border-bottom: 1px solid #3a2a1a;
            cursor: pointer;
            transition: 0.1s;
        }
        .menu-row:hover {
            background: #3a2a1a;
            color: #ffd78a;
        }
        .menu-row .key-hint {
            color: #8a7a6a;
            font-size: 14px;
        }
        #exit-prompt {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0e6d0;
            font-size: 28px;
            text-shadow: 2px 2px 0 #1a0a0a;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            display: none;
            pointer-events: none;
            border: 1px solid #b8a080;
        }
        #text-box {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 640px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #f0e6d0;
            border-radius: 20px;
            padding: 20px 28px;
            color: #f0e6d0;
            font-size: 24px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            display: none;
            pointer-events: auto;
            text-shadow: 2px 2px 0 #1a0a0a;
            letter-spacing: 0.5px;
            min-height: 80px;
            align-items: center;
        }
        #text-box .text-content {
            width: 100%;
            word-break: break-word;
        }
        #text-box .skip-hint {
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 14px;
            color: #8a7a6a;
        }
        #text-box.active {
            display: flex;
        }
        .hidden {
            display: none !important;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f0e6d0;
            font-size: 24px;
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 30px 50px;
            border-radius: 20px;
            border: 2px solid #f0e6d0;
        }
        #loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f0e6d0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="loading">
        <div class="spinner"></div>
        <div>Cargando assets...</div>
        <div style="font-size:14px; margin-top:10px; color:#8a7a6a;" id="load-status">0/10</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui-layer">
        <div id="pause-menu">
            <div class="title">☀ PAUSA</div>
            <div class="menu-row">Idioma <span class="key-hint">(ES)</span></div>
            <div class="menu-row">Volumen <span class="key-hint">🔊</span></div>
            <div class="menu-row">Diálogos <span class="key-hint">📖</span></div>
            <div class="menu-row">SFX <span class="key-hint">🔘</span></div>
            <div class="menu-row">Activar WASD <span class="key-hint">[W A S D]</span></div>
        </div>
        <div id="exit-prompt">Saliendo<span id="exitDots">.</span></div>
        <div id="text-box">
            <div class="text-content" id="dialogueText">Hola, soy un texto de IA.</div>
            <div class="skip-hint">[Shift: saltar] [Enter: cerrar]</div>
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const loadStatus = document.getElementById('load-status');

        // ---- Assets que se cargarán ----
        const ASSETS = {
            // Sprites de Frisk
            'downIdle': 'Frisk_abajoAFK.webp',
            'downWalk': 'Frisk_AbajoCaminar.gif',
            'upWalk': 'Frisk_ArribaCaminar.gif',
            'rightWalk': 'Frisk_DerechaCaminar.gif',
            'rightIdle': 'Frisk_DerechaAFK.webp',
            'upIdle': 'Frisk_ArribaAFK.webp',
            // Para izquierda usaremos los de derecha volteados (se hará en código)
            'leftIdle': null, // se genera volteando rightIdle
            'leftWalk': null, // se genera volteando rightWalk
            // Fondo y música
            'background': 'Fondo.png',
            'music': 'Fondooo.mp3',
            'talkSound': 'Talkk.mp3'
        };

        // Objeto para almacenar los recursos cargados
        const loadedAssets = {
            images: {},
            audio: {}
        };

        let assetsLoaded = 0;
        const totalAssets = Object.keys(ASSETS).length;

        function updateLoadStatus() {
            loadStatus.textContent = `${assetsLoaded}/${totalAssets}`;
        }

        // ---- Función para cargar imágenes ----
        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => {
                    console.warn(`⚠️ No se pudo cargar: ${url}, usando sprite generado`);
                    resolve(null);
                };
                img.src = url;
            });
        }

        // ---- Función para cargar audio ----
        function loadAudio(url) {
            return new Promise((resolve) => {
                const audio = new Audio();
                audio.oncanplaythrough = () => resolve(audio);
                audio.onerror = () => {
                    console.warn(`⚠️ No se pudo cargar audio: ${url}`);
                    resolve(null);
                };
                audio.src = url;
                audio.load();
            });
        }

        // ---- Generar sprites de respaldo (si no se cargan los archivos) ----
        function createFallbackSprite(label, color = '#b8a090') {
            const c = document.createElement('canvas');
            c.width = 32;
            c.height = 48;
            const cx = c.getContext('2d');
            cx.fillStyle = color;
            cx.fillRect(0, 0, 32, 48);
            cx.strokeStyle = '#2a1a0a';
            cx.lineWidth = 2;
            cx.strokeRect(2, 2, 28, 44);
            cx.fillStyle = '#1a0a0a';
            cx.font = '10px monospace';
            cx.textAlign = 'center';
            cx.textBaseline = 'middle';
            cx.fillText(label || 'Frisk', 16, 24);
            return c;
        }

        // ---- Cargar todos los assets ----
        async function loadAllAssets() {
            // Cargar imágenes
            const imagePromises = [];
            const imageNames = ['downIdle', 'downWalk', 'upWalk', 'rightWalk', 'rightIdle', 'upIdle', 'background'];
            
            for (const name of imageNames) {
                const url = ASSETS[name];
                if (url) {
                    imagePromises.push(
                        loadImage(url).then(img => {
                            if (img) {
                                loadedAssets.images[name] = img;
                            } else {
                                // Crear sprite de respaldo
                                const label = name.replace('Idle', ' AFK').replace('Walk', ' WALK');
                                loadedAssets.images[name] = createFallbackSprite(label);
                            }
                            assetsLoaded++;
                            updateLoadStatus();
                        })
                    );
                }
            }

            // Cargar audio
            const audioPromises = [];
            if (ASSETS.music) {
                audioPromises.push(
                    loadAudio(ASSETS.music).then(audio => {
                        if (audio) {
                            loadedAssets.audio.music = audio;
                            loadedAssets.audio.music.loop = true;
                        }
                        assetsLoaded++;
                        updateLoadStatus();
                    })
                );
            }
            if (ASSETS.talkSound) {
                audioPromises.push(
                    loadAudio(ASSETS.talkSound).then(audio => {
                        if (audio) {
                            loadedAssets.audio.talk = audio;
                        }
                        assetsLoaded++;
                        updateLoadStatus();
                    })
                );
            }

            // Esperar a que todo cargue
            await Promise.all([...imagePromises, ...audioPromises]);

            // Generar sprites de izquierda volteando los de derecha
            if (loadedAssets.images.rightIdle) {
                loadedAssets.images.leftIdle = flipImage(loadedAssets.images.rightIdle);
            } else {
                loadedAssets.images.leftIdle = createFallbackSprite('← AFK', '#b8a090');
            }
            if (loadedAssets.images.rightWalk) {
                loadedAssets.images.leftWalk = flipImage(loadedAssets.images.rightWalk);
            } else {
                loadedAssets.images.leftWalk = createFallbackSprite('← WALK', '#b8a090');
            }
            assetsLoaded += 2;
            updateLoadStatus();

            // Ocultar loading
            loading.style.display = 'none';

            // Iniciar música si está disponible
            if (loadedAssets.audio.music) {
                loadedAssets.audio.music.volume = 0.3;
                loadedAssets.audio.music.play().catch(() => {});
            }

            // Iniciar el juego
            gameLoop();
        }

        // ---- Función para voltear una imagen ----
        function flipImage(img) {
            const canvas = document.createElement('canvas');
            canvas.width = img.width || 32;
            canvas.height = img.height || 48;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(img, 0, 0);
            return canvas;
        }

        // ---- Estado del juego ----
        const state = {
            x: 380, y: 280,
            dir: 'down',
            moving: false,
            frame: 0,
            paused: false,
            dialogueActive: false,
            dialogueText: '',
            dialogueFull: '',
            dialogueIndex: 0,
            dialogueTimer: 0,
            skipPressed: false,
            exitTimer: 0,
            exitActive: false,
            wasd: false,
            keys: {
                ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
                w: false, a: false, s: false, d: false, Escape: false
            }
        };

        // ---- Diálogos IA ----
        const iaMessages = [
            "La inteligencia artificial es como una estrella en el cosmos digital.",
            "Cada píxel de este mundo tiene una historia que contar.",
            "La determinación es el alma de todo viajero.",
            "En el subsuelo, el tiempo se mide en latidos de corazón.",
            "Frisk, el poder de la amistad trasciende cualquier código.",
            "Sans siempre dice: 'estás teniendo un mal momento, ¿verdad?'",
            "El amor y la compasión son el verdadero motor del universo.",
            "Este texto ha sido generado por una IA con mucho cariño."
        ];

        function getRandomIAText() {
            return iaMessages[Math.floor(Math.random() * iaMessages.length)];
        }

        // ---- Sonido de diálogo ----
        function playTalkSound() {
            if (loadedAssets.audio.talk) {
                try {
                    const audio = loadedAssets.audio.talk.cloneNode();
                    audio.volume = 0.2;
                    audio.play().catch(() => {});
                } catch(e) {}
            } else {
                // Fallback: oscilador
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400 + Math.random()*200, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.08);
                } catch(e) {}
            }
        }

        // ---- Dibujo ----
        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            // Fondo
            if (loadedAssets.images.background) {
                ctx.drawImage(loadedAssets.images.background, 0, 0, 800, 600);
            } else {
                // Fondo de respaldo
                ctx.fillStyle = '#2a2a3e';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#4a4a5e';
                for(let i=0; i<30; i++) {
                    ctx.beginPath();
                    ctx.arc(40+Math.random()*720, 40+Math.random()*520, 8+Math.random()*20, 0, Math.PI*2);
                    ctx.fillStyle = `hsl(${200+Math.random()*40}, 50%, ${20+Math.random()*20}%)`;
                    ctx.fill();
                }
                ctx.fillStyle = '#8a7a5a';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('★ UNDERGROUND ★', 280, 80);
            }

            // Personaje
            const spriteKey = (() => {
                const dirMap = {
                    down: state.moving ? 'downWalk' : 'downIdle',
                    up: state.moving ? 'upWalk' : 'upIdle',
                    right: state.moving ? 'rightWalk' : 'rightIdle',
                    left: state.moving ? 'leftWalk' : 'leftIdle'
                };
                return dirMap[state.dir] || 'downIdle';
            })();
            
            const sprite = loadedAssets.images[spriteKey];
            if (sprite) {
                ctx.drawImage(sprite, state.x-16, state.y-24, 32, 48);
            } else {
                // Fallback
                ctx.fillStyle = '#b8a090';
                ctx.fillRect(state.x-12, state.y-20, 24, 40);
                ctx.fillStyle = '#1a0a0a';
                ctx.font = '12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('Frisk', state.x, state.y);
            }
        }

        // ---- Movimiento ----
        function updateMovement() {
            if (state.paused || state.dialogueActive || state.exitActive) return;

            const k = state.keys;
            const useWASD = state.wasd;
            
            const up = k.ArrowUp || (useWASD && k.w);
            const down = k.ArrowDown || (useWASD && k.s);
            const left = k.ArrowLeft || (useWASD && k.a);
            const right = k.ArrowRight || (useWASD && k.d);

            let dx = 0, dy = 0;

            if (up && !down) dy = -1;
            else if (down && !up) dy = 1;
            
            if (right && !left) dx = 1;
            else if (left && !right) dx = -1;

            if (dx !== 0 || dy !== 0) {
                if (dy < 0 && dx === 0) state.dir = 'up';
                else if (dy > 0 && dx === 0) state.dir = 'down';
                else if (dx < 0 && dy === 0) state.dir = 'left';
                else if (dx > 0 && dy === 0) state.dir = 'right';
                else if (dy < 0 && dx < 0) state.dir = 'left';
                else if (dy < 0 && dx > 0) state.dir = 'right';
                else if (dy > 0 && dx < 0) state.dir = 'left';
                else if (dy > 0 && dx > 0) state.dir = 'right';
                
                state.moving = true;
                state.x += dx * 2.5;
                state.y += dy * 2.5;
                state.x = Math.min(780, Math.max(20, state.x));
                state.y = Math.min(560, Math.max(40, state.y));
                state.frame = (state.frame + 1) % 20;
            } else {
                state.moving = false;
            }

            // Si opuestos, se queda quieto
            if ((up && down) || (left && right)) {
                state.moving = false;
            }
        }

        // ---- Diálogo ----
        function startDialogue() {
            if (state.dialogueActive) return;
            const msg = getRandomIAText();
            state.dialogueFull = msg;
            state.dialogueText = '';
            state.dialogueIndex = 0;
            state.dialogueActive = true;
            state.dialogueTimer = 0;
            document.getElementById('text-box').classList.add('active');
            document.getElementById('dialogueText').innerText = '';
            playTalkSound();
        }

        function updateDialogue() {
            if (!state.dialogueActive) return;
            const textEl = document.getElementById('dialogueText');

            if (state.skipPressed) {
                state.dialogueText = state.dialogueFull;
                textEl.innerText = state.dialogueFull;
                state.skipPressed = false;
                return;
            }

            if (state.dialogueIndex < state.dialogueFull.length) {
                state.dialogueTimer++;
                if (state.dialogueTimer % 3 === 0) {
                    state.dialogueText += state.dialogueFull[state.dialogueIndex];
                    textEl.innerText = state.dialogueText;
                    state.dialogueIndex++;
                    playTalkSound();
                }
            }
        }

        function closeDialogue() {
            state.dialogueActive = false;
            document.getElementById('text-box').classList.remove('active');
        }

        // ---- Pausa ----
        function togglePause() {
            state.paused = !state.paused;
            const menu = document.getElementById('pause-menu');
            if (state.paused) {
                menu.classList.add('active');
                if (loadedAssets.audio.music) loadedAssets.audio.music.pause();
            } else {
                menu.classList.remove('active');
                if (loadedAssets.audio.music) loadedAssets.audio.music.play().catch(() => {});
            }
        }

        // ---- Salir ----
        function updateExit() {
            if (state.exitActive) {
                state.exitTimer++;
                if (state.exitTimer > 20) {
                    document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0a0a0a;color:#f0e6d0;font-family:monospace;font-size:40px;">👋 Hasta luego, Frisk.</div>';
                    if (loadedAssets.audio.music) loadedAssets.audio.music.pause();
                    return;
                }
                const dots = Math.min(3, Math.floor(state.exitTimer / 7));
                document.getElementById('exitDots').innerText = '.'.repeat(dots);
                return;
            }

            if (state.keys.Escape) {
                state.exitTimer++;
                if (state.exitTimer > 60) {
                    state.exitActive = true;
                    state.exitTimer = 0;
                    document.getElementById('exit-prompt').style.display = 'block';
                    document.getElementById('exitDots').innerText = '.';
                }
            } else {
                state.exitTimer = 0;
                if (!state.exitActive) {
                    document.getElementById('exit-prompt').style.display = 'none';
                }
            }
        }

        // ---- Eventos de teclado ----
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
                e.preventDefault();
            }

            if (key === 'Tab') {
                e.preventDefault();
                state.wasd = !state.wasd;
                return;
            }

            if (key === 'Escape') {
                e.preventDefault();
                state.keys.Escape = true;
                return;
            }

            if (key === 'l' || key === 'L') {
                if (!state.dialogueActive && !state.paused && !state.exitActive) {
                    startDialogue();
                }
                return;
            }

            if (key === 'Shift') {
                state.skipPressed = true;
                return;
            }

            if (key === 'Enter') {
                if (state.dialogueActive) {
                    closeDialogue();
                    return;
                }
                return;
            }

            const k = key.toLowerCase();
            if (k === 'arrowup' || k === 'w') { state.keys.ArrowUp = true; state.keys.w = true; }
            if (k === 'arrowdown' || k === 's') { state.keys.ArrowDown = true; state.keys.s = true; }
            if (k === 'arrowleft' || k === 'a') { state.keys.ArrowLeft = true; state.keys.a = true; }
            if (k === 'arrowright' || k === 'd') { state.keys.ArrowRight = true; state.keys.d = true; }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
                e.preventDefault();
            }
            if (key === 'Escape') {
                state.keys.Escape = false;
                if (!state.exitActive) {
                    document.getElementById('exit-prompt').style.display = 'none';
                    state.exitTimer = 0;
                }
                return;
            }
            if (key === 'Tab') return;

            const k = key.toLowerCase();
            if (k === 'arrowup' || k === 'w') { state.keys.ArrowUp = false; state.keys.w = false; }
            if (k === 'arrowdown' || k === 's') { state.keys.ArrowDown = false; state.keys.s = false; }
            if (k === 'arrowleft' || k === 'a') { state.keys.ArrowLeft = false; state.keys.a = false; }
            if (k === 'arrowright' || k === 'd') { state.keys.ArrowRight = false; state.keys.d = false; }
            if (k === 'shift') state.skipPressed = false;
        });

        // ---- Manejo de ESC para pausa ----
        let escPressTime = 0;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!state.exitActive && !state.paused && !state.dialogueActive) {
                    if (escPressTime === 0) escPressTime = Date.now();
                }
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'Escape') {
                const duration = Date.now() - escPressTime;
                if (duration < 300 && !state.exitActive) {
                    if (!state.paused) togglePause();
                    else togglePause();
                }
                escPressTime = 0;
            }
        });

        // ---- Bucle del juego ----
        function gameLoop() {
            if (!state.exitActive) {
                updateMovement();
                updateDialogue();
                updateExit();
            } else {
                updateExit();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ---- Iniciar carga ----
        loadAllAssets();

        window.addEventListener('beforeunload', (e) => {
            if (!state.exitActive) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        console.log('🎮 Undertale Frisk · Cargando assets desde GitHub...');
    })();
</script>
</body>
</html>
