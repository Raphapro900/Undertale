<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Easter Egg</title>
    <style>
        /* IMPORTACIÓN DIRECTA DE DETERMINATION MONO */
        @font-face {
            font-family: 'Determination Mono';
            src: url('https://jsdelivr.net') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Determination Mono', monospace;
            
            /* Píxeles perfectos sin verse borrosos */
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
            font-smooth: never;
            rendering: crisp-edges;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        /* EFECTO DE TEMBLOR DE PANTALLA */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-4px, -4px); }
            20% { transform: translate(4px, 2px); }
            30% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -2px); }
            50% { transform: translate(-2px, 4px); }
            60% { transform: translate(4px, 4px); }
            70% { transform: translate(-4px, -2px); }
            80% { transform: translate(2px, -4px); }
            90% { transform: translate(-4px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .shaking {
            animation: shake 0.15s infinite;
        }

        .dialogue-container {
            border: 4px solid #ffffff;
            padding: 24px;
            width: 80%;
            max-width: 600px;
            min-height: 120px;
            background-color: #000000;
            box-sizing: border-box;
            position: relative;
        }

        .text-content {
            font-family: 'Determination Mono', monospace;
            font-size: 32px; 
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            letter-spacing: 0.5px;
        }

        .yellow-text {
            color: #ffff00;
            font-family: 'Determination Mono', monospace;
        }

        .red-text {
            color: #ff0000;
            font-family: 'Determination Mono', monospace;
            text-transform: uppercase;
        }

        .hint {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 16px;
            color: #555555;
            font-family: 'Determination Mono', monospace;
        }
    </style>
</head>
<body>

    <div id="wrapper" class="dialogue-container">
        <div id="dialogue" class="text-content">* Presiona la tecla L para comenzar...</div>
        <div class="hint">Presiona L</div>
    </div>

    <script>
        // Banco de diálogos variados de Undertale
        const undertaleQuotes = [
            "* Mantente determinado.",
            "* Realmente eres un flojo de primera.",
            "* ¿Quieres pasar un mal rato?",
            "* En este mundo, es MATAR o MORIR.",
            "* Cocinar con Undyne es un peligro de incendio real.",
            "* TIP: Si un ataque es azul, no te muevas.",
            "* TIP: Si un ataque es naranja, muévete a través de él.",
            "* DETALLE: W.D. Gaster vigila desde los archivos borrados.",
            "* A Papyrus le encantan los rompecabezas, pero nunca ha probado el spaghetti.",
            "* Si perdonas a todos, verás la luz del sol.",
            "* Aunque cambies de ruta, tus pecados no se borrarán.",
            "* ¿Huele a tierra húmeda... o a consecuencias?",
            "* Tocar el piano en Waterfall revela una puerta secreta.",
            "* Comer la tarta de Toriel en la batalla de Asgore debilita su ataque.",
            "* Vender cosas a Temmie es la única forma de conseguir oro fácil."
        ];

        let pressCount = 0;
        let isTyping = false;
        let currentHTMLText = ""; 
        let typeTimeout;

        // Sonido que debe estar en tu GitHub
        const textSound = new Audio('underrr.mp3');

        function typeWriter(text, elementId, speed = 40, callback = null) {
            isTyping = true;
            currentHTMLText = text;
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = ''; 

            function type() {
                if (i < text.length) {
                    if (text.substring(i, i + 1) === '<') {
                        let closingTagIndex = text.indexOf('>', i);
                        element.innerHTML += text.substring(i, closingTagIndex + 1);
                        i = closingTagIndex + 1;
                    } else {
                        element.innerHTML += text.charAt(i);
                        i++;
                    }

                    if (textSound) {
                        textSound.currentTime = 0;
                        textSound.play().catch(e => console.log("Audio listo"));
                    }
                    typeTimeout = setTimeout(type, speed);
                } else {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            type();
        }

        function skipDialogue() {
            clearTimeout(typeTimeout);
            document.getElementById("dialogue").innerHTML = currentHTMLText;
            isTyping = false;
        }

        window.addEventListener('keydown', (event) => {
            if (event.key === 'l' || event.key === 'L') {
                
                // Si presionas L mientras escribe, se salta el texto rápido
                if (isTyping) {
                    if (pressCount !== 55) {
                        skipDialogue();
                        return;
                    }
                } 

                pressCount++;

                if (pressCount === 50) {
                    typeWriter("* ...", "dialogue");
                } 
                else if (pressCount === 51) {
                    typeWriter('* ¿Porqué presionas muchas veces la <span class="yellow-text">L</span>?', "dialogue");
                } 
                else if (pressCount >= 52 && pressCount <= 54) {
                    typeWriter("* ...", "dialogue");
                } 
                else if (pressCount === 55) {
                    // Hace que la pantalla tiemble
                    document.getElementById("wrapper").classList.add("shaking");
                    
                    // Escribe el texto en rojo solicitado
                    typeWriter('<span class="red-text">* YAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA</span>', "dialogue", 15, () => {
                        // Espera 1 segundo y CRASHEA/CIERRA la pestaña al estilo Flowey
                        setTimeout(() => {
                            // Este comando rompe la pestaña inmediatamente simulando un cierre forzado del juego
                            Object.defineProperty(URL, 'createObjectURL', {writable: false, value: function() {}});
                            window.location.reload();
                            // Respaldo de crash definitivo
                            while(true) {  }
                        }, 1000);
                    });
                } 
                else if (pressCount < 50) {
                    const randomIndex = Math.floor(Math.random() * undertaleQuotes.length);
                    typeWriter(undertaleQuotes[randomIndex], "dialogue");
                }
            }
        });
    </script>
</body>
</html>
