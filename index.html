<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Easter Egg</title>
    <style>
        /* ===== CARGA DE FUENTE DESDE OLIVERSPACE ===== */
        @font-face {
            font-family: 'Determination Mono';
            src: url('https://oliverspace.neocities.org/determination-mono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ===== ESTILOS DEL CUADRO DE DIÁLOGO ESTILO UNDERTALE ===== */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
            font-family: 'Determination Mono', 'Courier New', monospace;
        }

        /* CUADRO PRINCIPAL - FONDO NEGRO CON BORDE BLANCO */
        .dialogue-box {
            position: relative;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px 24px;
            margin: 0 auto;
            box-sizing: border-box;
            min-height: 100px;
            width: 80%;
            max-width: 600px;
            text-align: left;
            overflow: hidden;
            font-family: 'Determination Mono', 'Courier New', monospace;
        }

        /* CONTENEDOR DEL TEXTO */
        .dialogue-box p {
            margin: 0;
            padding: 0;
            color: #ffffff;
            font-size: 28px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Determination Mono', 'Courier New', monospace;
            letter-spacing: 0.5px;
            text-shadow: none;
        }

        /* NOMBRE DEL PERSONAJE (opcional, como en Undertale) */
        .speaker-name {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 8px;
            font-family: 'Determination Mono', 'Courier New', monospace;
            letter-spacing: 1px;
        }

        /* TEXTO AMARILLO */
        .yellow-text {
            color: #ffff00;
            font-family: 'Determination Mono', 'Courier New', monospace;
        }

        /* TEXTO ROJO */
        .red-text {
            color: #ff0000;
            font-family: 'Determination Mono', 'Courier New', monospace;
            text-transform: uppercase;
        }

        /* ===== EFECTO DE TEMBLOR ===== */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-4px, -4px); }
            20% { transform: translate(4px, 2px); }
            30% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -2px); }
            50% { transform: translate(-2px, 4px); }
            60% { transform: translate(4px, 4px); }
            70% { transform: translate(-4px, -2px); }
            80% { transform: translate(2px, -4px); }
            90% { transform: translate(-4px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .shaking {
            animation: shake 0.15s infinite;
        }

        /* ===== TRIÁNGULO INDICADOR (como en Undertale) ===== */
        .indicator {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #ffffff;
            font-size: 24px;
            font-family: 'Determination Mono', 'Courier New', monospace;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== HINT (inferior derecho) ===== */
        .hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            color: #555555;
            font-family: 'Determination Mono', 'Courier New', monospace;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- ===== CUADRO DE DIÁLOGO ESTILO UNDERTALE ===== -->
    <div id="dialogue-box" class="dialogue-box">
        <div id="speaker-name" class="speaker-name"></div>
        <p id="dialogue-text"></p>
        <div class="indicator">▼</div>
    </div>

    <div class="hint">Presiona L</div>

    <script>
        // ============================================================
        // BANCO DE DIÁLOGOS DE UNDERTALE
        // ============================================================
        const undertaleQuotes = [
            "* Mantente determinado.",
            "* Realmente eres un flojo de primera.",
            "* ¿Quieres pasar un mal rato?",
            "* En este mundo, es MATAR o MORIR.",
            "* Cocinar con Undyne es un peligro de incendio real.",
            "* TIP: Si un ataque es azul, no te muevas.",
            "* TIP: Si un ataque es naranja, muévete a través de él.",
            "* DETALLE: W.D. Gaster vigila desde los archivos borrados.",
            "* A Papyrus le encantan los rompecabezas, pero nunca ha probado el spaghetti.",
            "* Si perdonas a todos, verás la luz del sol.",
            "* Aunque cambies de ruta, tus pecados no se borrarán.",
            "* ¿Huele a tierra húmeda... o a consecuencias?",
            "* Tocar el piano en Waterfall revela una puerta secreta.",
            "* Comer la tarta de Toriel en la batalla de Asgore debilita su ataque.",
            "* Vender cosas a Temmie es la única forma de conseguir oro fácil."
        ];

        // ============================================================
        // VARIABLES DE CONTROL
        // ============================================================
        let pressCount = 0;
        let isTyping = false;
        let typeTimeout = null;
        let currentText = "";
        const dialogueElement = document.getElementById('dialogue-text');
        const nameElement = document.getElementById('speaker-name');

        // ============================================================
        // EFECTO DE ESCRITURA (MÁQUINA DE ESCRIBIR)
        // ============================================================
        function typeWriter(text, speed = 40, callback = null) {
            if (typeTimeout) {
                clearTimeout(typeTimeout);
                typeTimeout = null;
            }
            
            isTyping = true;
            currentText = text;
            dialogueElement.innerHTML = '';
            let i = 0;

            function type() {
                if (i < text.length) {
                    // Manejar etiquetas HTML (como <span>)
                    if (text[i] === '<') {
                        let closingIndex = text.indexOf('>', i);
                        if (closingIndex !== -1) {
                            const tag = text.substring(i, closingIndex + 1);
                            dialogueElement.innerHTML += tag;
                            i = closingIndex + 1;
                        } else {
                            dialogueElement.innerHTML += text[i];
                            i++;
                        }
                    } else {
                        dialogueElement.innerHTML += text[i];
                        i++;
                    }

                    typeTimeout = setTimeout(type, speed);
                } else {
                    isTyping = false;
                    typeTimeout = null;
                    if (callback) callback();
                }
            }
            type();
        }

        // ============================================================
        // SALTAR DIÁLOGO (si se presiona L mientras escribe)
        // ============================================================
        function skipDialogue() {
            if (typeTimeout) {
                clearTimeout(typeTimeout);
                typeTimeout = null;
            }
            if (currentText) {
                dialogueElement.innerHTML = currentText;
            }
            isTyping = false;
        }

        // ============================================================
        // FUNCIÓN PARA CERRAR LA PÁGINA LITERALMENTE
        // ============================================================
        function closePageLiterally() {
            window.close();
            try {
                window.location.href = 'about:blank';
            } catch (_) {}
            setTimeout(() => {
                while (true) {}
            }, 50);
        }

        // ============================================================
        // MANEJADOR DE TECLA 'L'
        // ============================================================
        document.addEventListener('keydown', (event) => {
            if (event.key !== 'l' && event.key !== 'L') return;

            // Si está escribiendo, saltar el diálogo (excepto en el evento 55)
            if (isTyping) {
                if (pressCount !== 55) {
                    skipDialogue();
                    return;
                }
                return;
            }

            pressCount++;

            // --- DIÁLOGOS ALEATORIOS (clics 1-49) ---
            if (pressCount < 50) {
                const randomIndex = Math.floor(Math.random() * undertaleQuotes.length);
                nameElement.textContent = "";
                typeWriter(undertaleQuotes[randomIndex], 40);
                return;
            }

            // --- SECUENCIA ESPECIAL (a partir del clic 50) ---
            if (pressCount === 50) {
                nameElement.textContent = "";
                typeWriter("* ...", 40);
                return;
            }

            if (pressCount === 51) {
                nameElement.textContent = "";
                typeWriter('* ¿Porqué presionas muchas veces la <span class="yellow-text">L</span>?', 40);
                return;
            }

            if (pressCount >= 52 && pressCount <= 54) {
                nameElement.textContent = "";
                typeWriter("* ...", 40);
                return;
            }

            // --- EVENTO 55: TEXTO ROJO + TEMBLOR + CIERRE ---
            if (pressCount === 55) {
                // Activar temblor
                document.getElementById('dialogue-box').classList.add('shaking');
                
                // Escribir el texto rojo
                const redText = '<span class="red-text">* YAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA</span>';
                typeWriter(redText, 15, () => {
                    // Esperar 0.5 segundos y cerrar
                    setTimeout(() => {
                        document.getElementById('dialogue-box').classList.remove('shaking');
                        closePageLiterally();
                    }, 500);
                });
                return;
            }

            // Si pasamos de 55, no hacemos nada (ya debería haber cerrado)
        });

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        console.log('Undertale Easter Egg cargado. Presiona L para comenzar.');
        
        // Diálogo inicial
        setTimeout(() => {
            typeWriter("* Presiona la tecla L para comenzar...", 40);
        }, 300);
    </script>
</body>
</html>
