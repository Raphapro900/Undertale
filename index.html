<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Easter Egg</title>
    <style>
        /* Carga de la fuente pixelada Determination Mono */
        @font-face {
            font-family: 'Determination Mono';
            src: url('https://jsdelivr.net') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Determination Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        .dialogue-container {
            border: 4px solid #ffffff;
            padding: 24px;
            width: 80%;
            max-width: 600px;
            min-height: 120px;
            background-color: #000000;
            box-sizing: border-box;
            position: relative;
        }

        .text-content {
            font-size: 28px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Estilos específicos pedidos */
        .yellow-text {
            color: #ffff00;
            font-weight: bold;
        }

        .red-text {
            color: #ff0000;
            font-weight: bold;
        }

        .hint {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 14px;
            color: #555555;
        }
    </style>
</head>
<body>

    <div class="dialogue-container">
        <div id="dialogue" class="text-content">* Presiona la tecla L para comenzar...</div>
        <div class="hint">Presiona L</div>
    </div>

    <script>
        // Banco de diálogos variados de Undertale (Secretos, tips, lore)
        const undertaleQuotes = [
            "* Mantente determinado.",
            "* Realmente eres un flojo de primera.",
            "* ¿Quieres pasar un mal rato?",
            "* En este mundo, es MATAR o MORIR.",
            "* Cocinar con Undyne es un peligro de incendio real.",
            "* TIP: Si un ataque es azul, no te muevas.",
            "* TIP: Si un ataque es naranja, muévete a través de él.",
            "* DETALLE: W.D. Gaster vigila desde los archivos borrados.",
            "* A Papyrus le encantan los rompecabezas, pero nunca ha probado el spaghetti.",
            "* Si perdonas a todos, verás la luz del sol.",
            "* Aunque cambies de ruta, tus pecados no se borrarán.",
            "* ¿Huele a tierra húmeda... o a consecuencias?",
            "* Tocar el piano en Waterfall revela una puerta secreta.",
            "* Comer la tarta de Toriel en la batalla de Asgore debilita su ataque.",
            "* Vender cosas a Temmie es la única forma de conseguir oro fácil."
        ];

        let pressCount = 0;
        let isTyping = false;
        let typeTimeout;

        // Cargar el archivo de sonido local de tu repositorio
        const textSound = new Audio('underrr.mp3');

        // Función para simular la escritura de Undertale carácter por carácter
        function typeWriter(text, elementId, speed = 40, callback = null) {
            isTyping = true;
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = ''; // Limpiar texto anterior

            function type() {
                if (i < text.length) {
                    // Si el texto contiene marcado HTML lo procesamos correctamente
                    if (text.substring(i, i + 1) === '<') {
                        let closingTagIndex = text.indexOf('>', i);
                        element.innerHTML += text.substring(i, closingTagIndex + 1);
                        i = closingTagIndex + 1;
                    } else {
                        element.innerHTML += text.charAt(i);
                        i++;
                    }

                    // Reproducir sonido "underrr.mp3" rebobinando rápidamente
                    if (textSound) {
                        textSound.currentTime = 0;
                        textSound.play().catch(e => console.log("Audio esperando interacción"));
                    }
                    typeTimeout = setTimeout(type, speed);
                } else {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            type();
        }

        // Listener de teclado
        window.addEventListener('keydown', (event) => {
            // Validar si presionó la tecla L (Mayúscula o minúscula)
            if (event.key === 'l' || event.key === 'L') {
                
                // Si el script ya está escribiendo, ignorar la pulsación rápida para no superponer texto
                if (isTyping) return; 

                pressCount++;

                if (pressCount === 50) {
                    typeWriter("* ...", "dialogue");
                } 
                else if (pressCount === 51) {
                    // Resaltar la letra L en amarillo usando HTML interno
                    typeWriter('* ¿Porqué presionas muchas veces la <span class="yellow-text">L</span>?', "dialogue");
                } 
                else if (pressCount >= 52 && pressCount <= 54) {
                    typeWriter("* ...", "dialogue");
                } 
                else if (pressCount === 55) {
                    // Texto en rojo chillón y cierre de pestaña 1 segundo después
                    typeWriter('<span class="red-text">* YAAAAAAAAAAAAAAAAAA</span>', "dialogue", 20, () => {
                        setTimeout(() => {
                            window.close();
                            // Alternativa por si el navegador bloquea window.close()
                            document.body.innerHTML = '<h1 style="color:red; text-align:center; margin-top:20vh;">PÁGINA DESTRUIDA</h1>';
                        }, 1000);
                    });
                } 
                else if (pressCount < 50) {
                    // Diálogos normales aleatorios antes del contador 50
                    const randomIndex = Math.floor(Math.random() * undertaleQuotes.length);
                    typeWriter(undertaleQuotes[randomIndex], "dialogue");
                }
            }
        });
    </script>
</body>
</html>
